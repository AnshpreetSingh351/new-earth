<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Real Estate Map</title>

  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #map {
      position: fixed;
      inset: 0;
    }

    #panel {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 10px;
      z-index: 9999; /* 🔥 FIXED */
      pointer-events: auto;
    }

    #panel button {
      display: block;
      margin-bottom: 10px;
      padding: 10px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
    }

    .marker {
      width: 20px;
      height: 20px;
      background: #00BFFF;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="panel">
  <button onclick="focusProject(0)">London Square</button>
  <button onclick="focusProject(1)">CM Infinia</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/three@0.126.1/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.126.1/examples/js/loaders/GLTFLoader.js"></script>

<script src="script.js"></script>

</body>
</html>
