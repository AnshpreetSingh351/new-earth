<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Real Estate Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* .leaflet-tile {
      filter: grayscale(100%) brightness(0.6) contrast(1.2);
    } */

    .leaflet-control-layers {
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border-radius: 10px;
    }

    /* #map {
      height: 100vh;
      width: 100%;
      transform: perspective(1000px) rotateX(45deg);
      transform-origin: center;
    } */

    #projectPanel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 12px;
  color: white;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 1000;
}

#projectPanel button {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

#projectPanel button:hover {
  background: #00BFFF;
}
.office-marker {
  filter: drop-shadow(0 0 12px #00BFFF);
}


.custom-office-marker {
  display: flex;
  align-items: center;
  justify-content: center;
}

.office-logo {
  width: 160px;
  height: 60px;
  background: url('Logo.png') no-repeat center;
  background-size: contain;

  filter: drop-shadow(0 0 15px #00BFFF);
  transition: 0.3s;
}

.custom-office-marker:hover .office-logo {
  transform: scale(1.1);
}
  </style>
</head>

<body>
<div id="projectPanel">
  <div class="panel-title">Projects</div>

  <button onclick="focusProject(0)">MDB London Square</button>
  <button onclick="focusProject(1)">CM Infinia</button>
</div>



  <div id="map"></div>
<div style="position:fixed; bottom:10px; left:10px; font-size:10px; color:#aaa;">
  
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script src="script.js"></script>

</body>

</html>
