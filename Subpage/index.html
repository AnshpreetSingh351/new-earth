<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Real Estate Map</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
  <style>
    :root {
      --panel-bg: rgba(25, 25, 25, 0.7);
      --button-bg: rgba(255, 255, 255, 0.08);
      --button-hover: rgba(255, 255, 255, 0.15);
      --accent-color: #00BFFF;
      --text-color: #ffffff;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', sans-serif;
      background-color: #1a1a1a;
    }

    #map { 
      width: 100%; 
      height: 100vh; 
    }

    #panel {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      z-index: 1000;
      width: 200px;
    }

    #panel::before {
      content: "PROJECTS";
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 15px;
      font-weight: 600;
    }

    #project-buttons button {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      padding: 12px 16px;
      background: var(--button-bg);
      color: var(--text-color);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #project-buttons button:last-child {
      margin-bottom: 0;
    }

    #project-buttons button:hover {
      background: var(--button-hover);
      transform: translateX(-5px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    #project-buttons button:active {
      transform: scale(0.97);
    }

    .marker {
      width: 16px;
      height: 16px;
      background: var(--accent-color);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.6);
      transition: transform 0.2s ease;
    }

    .marker:hover {
      transform: scale(1.3);
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div id="project-buttons"></div>
</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/three@0.126.1/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.126.1/examples/js/loaders/GLTFLoader.js"></script>
<script src="script.js"></script>

</body>
</html>
